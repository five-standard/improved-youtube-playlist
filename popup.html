<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 직접 저장</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="search" placeholder="제목으로 검색...">
      <button class="clear-search hidden" id="clear-search">×</button>
    </div>

    <!-- Video List -->
    <div class="video-list" id="video-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor" opacity="0.3">
          <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
        </svg>
        <p>저장된 영상이 없습니다</p>
        <small>YouTube에서 '직접 저장' 버튼을 눌러보세요</small>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <button class="icon-btn" id="settings-btn" title="설정">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
      <button class="icon-btn" id="refresh-btn" title="새로고침">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>
      <span class="sync-label" id="sync-label">마지막 동기화 : —</span>
      <span class="sync-indicator hidden" id="sync-indicator"></span>
      <span class="total-count" id="total-count">총 0개</span>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel hidden" id="settings-panel">
      <div class="settings-header">
        <h2>설정</h2>
        <button class="icon-btn" id="settings-close">×</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <h3>데이터 관리</h3>
          <div class="settings-btn-row">
            <button class="settings-btn" id="export-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
              </svg>
              내보내기
            </button>
            <button class="settings-btn" id="import-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
              </svg>
              가져오기
            </button>
          </div>
          <input type="file" id="import-file" accept=".json" hidden>
        </div>

        <div class="settings-section">
          <h3>GitHub Gist 동기화</h3>
          <div class="pastebin-label-row">
            <span>Personal Access Token</span>
            <a href="https://github.com/settings/tokens/new?scopes=gist&description=youtube-saver" target="_blank">(토큰 발급)</a>
          </div>
          <input class="pastebin-input" type="password" id="github-token" placeholder="ghp_...">
          <button class="settings-btn" id="github-token-save">저장</button>
          <hr class="settings-divider">
          <div class="sync-option-row">
            <span>자동 동기화</span>
            <label class="toggle-switch">
              <input type="checkbox" id="auto-sync-toggle">
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="sync-option-row hidden" id="auto-sync-interval-row">
            <span>자동 동기화 일정</span>
            <select id="auto-sync-interval" class="settings-select">
              <option value="1">1일</option>
              <option value="2">2일</option>
              <option value="7">7일</option>
              <option value="30">30일</option>
            </select>
          </div>
          <div class="sync-option-row hidden" id="gist-url-row">
            <span>Gist 링크</span>
            <a id="gist-url-link" href="#" target="_blank"></a>
          </div>
        </div>

        <div class="settings-section">
          <h3>디버깅</h3>
          <button class="settings-btn" id="update-data-btn">
            저장된 데이터 업데이트
          </button>
          <button class="settings-btn danger" id="clear-local-btn">
            저장된 데이터 초기화
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
